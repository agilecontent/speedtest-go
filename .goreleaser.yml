version: 2
project_name: 'adm-speedtest-go'
#dist: ./out
before:
  hooks:
    - go mod download
builds:
  - main: ./main.go
    id: adm-speedtest-backend
    binary: adm-speedtest-backend
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -w -s
    goos:
      - windows
      - linux
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    goarm:
      - 5
      - 6
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
    hooks:
      post: upx -9 "{{ .Path }}"
  - main: ./main.go
    id: adm-speedtest-backend-darwin
    binary: adm-speedtest-backend
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -w -s
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - main: ./main.go
    id: adm-speedtest-backend-freebsd
    binary: adm-speedtest-backend
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -w -s
    goos:
      - freebsd
    goarch:
      - amd64
      - arm64
  - main: ./main.go
    id: adm-speedtest-backend-noupx-windows-arm64
    binary: adm-speedtest-backend
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -w -s
    goos:
      - windows
    goarch:
      - arm
      - arm64
    goarm:
      - 5
      - 6
      - 7
archives:
  - format_overrides:
      - goos: windows
        formats: zip
    files:
      - README.md
      - LICENSE
      - settings.toml
checksum:
  name_template: 'checksums.txt'
changelog:
  disable: false
  sort: asc
release:
  github:
    owner: agilecontent
    name: adm-speedtest-go
  disable: false
